phase: train

tracker:
  name: 
  project: tcn_pred_dev

data_loader:
  name: TOWIDS
  raw_x_path: data/tow-ids-dataset/raw/Automotive_Ethernet_with_Attack_original_10_17_19_50_training.pcap
  raw_y_path: data/tow-ids-dataset/raw/y_train.csv
  number_of_bytes: 50
  protocol_filter: 'AVTP'

pre_processing:
  name: sliding-window
  processed_path: data/tow-ids-dataset/processed
  window_size: 64
  window_stride: 1
  save_batch_size: 10000
  save_subset: 0.1

modeling:
  structure:
    name: tcn_pred
    input_size: 50
    num_levels: 1
    hidden_size: 120
    kernel_size: 4
    dropout: 0.2
    final_layer: True
    T: 2
  
  training:
    name: pred
    criterion: mean_squared_error
    learning_rate: 0.0001
    num_epochs: 1
    es_patience: 5
    batch_size: 1
    clip: 0.2

  inference:
    name: pred
    batch_size: 64

metrics:
  name: anomaly_detector
