phase: train

tracker:
  name: 
  project: seqwatch_lstmae_dev

data_loader:
  name: TOWIDS
  raw_x_path: data/tow-ids-dataset/raw/Automotive_Ethernet_with_Attack_original_10_17_19_50_training.pcap
  raw_y_path: data/tow-ids-dataset/raw/y_train.csv
  test_raw_x_path: data/tow-ids-dataset/raw/Automotive_Ethernet_with_Attack_original_10_17_20_04_test.pcap
  test_raw_y_path: data/tow-ids-dataset/raw/y_test.csv
  number_of_bytes: 58

pre_processing:
  name: sliding-window
  processed_path: data/tow-ids-dataset/processed
  window_size: 128
  window_stride: 16
  save_batch_size: 10000

modeling:
  structure:
    name: seqwatch
    input_size: 58
    dropout: 0.5
    num_levels: 2
    hidden_size: 128
  
  training:
    name: ae
    criterion: mean_squared_error
    learning_rate: 0.001
    num_epochs: 250
    es_patience: 5
    es_delta: 0.0001
    batch_size: 64

  inference:
    name: ae
    batch_size: 64

metrics:
  name: ae
