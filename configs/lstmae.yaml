phase: train

tracker:
  name: 
  project: cae_lstmae_dev

data_loader:
  name: TOWIDS
  raw_x_path: data/tow-ids-dataset/raw/Automotive_Ethernet_with_Attack_original_10_17_19_50_training.pcap
  raw_y_path: data/tow-ids-dataset/raw/y_train.csv
  number_of_bytes: 58

pre_processing:
  name: sliding-window
  processed_path: data/tow-ids-dataset/processed
  window_size: 64
  window_stride: 1
  save_subset: 0.1
  save_batch_size: 10000

modeling:
  structure:
    name: lstmae
    input_size: 58
    hidden_size: 10
  
  training:
    name: ae
    criterion: mean_squared_error
    learning_rate: 0.0001
    num_epochs: 250
    es_patience: 5
    es_delta: 0.0001
    batch_size: 16

  inference:
    name: ae
    batch_size: 64

metrics:
  name: natasha_ae
  alpha: 0.5
